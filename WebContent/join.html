<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Chatbox - Join Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Join a Room</h2>
        <form id="joinRoomForm" action="StudentAuthServlet" method="POST">
            <input type="hidden" name="action" value="joinRoom">
            <div class="form-group">
                <label for="roomId">Room ID (4 Digits)</label>
                <input type="text" id="roomId" name="roomId" required placeholder="e.g., 1234" maxlength="4" pattern="\d{4}">
            </div>
            <div class="form-group">
                <label for="roomPassword">Password</label>
                <input type="password" id="roomPassword" name="roomPassword" required placeholder="Enter room password">
            </div>
            <p id="joinError" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 10px; display: none;"></p>
            <button type="submit" class="btn btn-primary">Enter Room</button>
        </form>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
