<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Chatbox - Student Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Student Registration</h2>
        <form id="registerForm" action="StudentAuthServlet" method="POST">
            <input type="hidden" name="action" value="register">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="regno">Register Number</label>
                <input type="text" id="regno" name="regno" required placeholder="e.g., 2023CS010">
            </div>
            <div class="form-group">
                <label for="college">College Name</label>
                <input type="text" id="college" name="college" required placeholder="Your college">
            </div>
            <div class="form-group">
                <label for="year">Year of Study</label>
                <select id="year" name="year" required>
                    <option value="" disabled selected>Select Year</option>
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                    <option value="3rd Year">3rd Year</option>
                    <option value="4th Year">4th Year</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="department">Department</label>
                <select id="department" name="department" required>
                    <option value="" disabled selected>Select your department</option>
                    <option value="Computer Science Engineering (CSE)">Computer Science Engineering (CSE)</option>
                    <option value="Information Technology (IT)">Information Technology (IT)</option>
                    <option value="Artificial Intelligence & Data Science (AI&DS)">Artificial Intelligence & Data Science (AI&DS)</option>
                    <option value="Electronics & Communication Engineering (ECE)">Electronics & Communication Engineering (ECE)</option>
                    <option value="Electrical & Electronics Engineering (EEE)">Electrical & Electronics Engineering (EEE)</option>
                    <option value="Mechanical Engineering (Mech)">Mechanical Engineering (Mech)</option>
                    <option value="Civil Engineering (Civil)">Civil Engineering (Civil)</option>
                    <option value="Chemical Engineering">Chemical Engineering</option>
                    <option value="Biomedical Engineering">Biomedical Engineering</option>
                    <option value="Textile Engineering">Textile Engineering</option>
                    <option value="Petrochemical Engineering">Petrochemical Engineering</option>
                    <option value="Aeronautical Engineering">Aeronautical Engineering</option>
                    <option value="Automobile Engineering">Automobile Engineering</option>
                    <option value="Mechatronics Engineering">Mechatronics Engineering</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Register & Continue</button>
            <div class="links">
                <p>Are you an Admin? <a href="admin.html">Login here</a></p>
            </div>
        </form>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
