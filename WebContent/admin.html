<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Chatbox - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Login Section -->
    <div class="container" id="adminLoginSection">
        <h2>Admin Login</h2>
        <form id="adminLoginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter admin username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter admin password">
            </div>
            <p id="loginError" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 10px; display: none;">Invalid credentials</p>
            <button type="submit" class="btn btn-primary">Login</button>
            <div class="links">
                <p>Are you a Student? <a href="index.html">Register here</a></p>
            </div>
        </form>
    </div>

    <!-- Dashboard Section (Hidden by default) -->
    <div class="container" id="adminDashboardSection" style="display: none; max-width: 600px;">
        <h2>Admin Dashboard</h2>
        <div style="margin-bottom: 2rem; background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 10px;">
            <h3>Create a New Room</h3>
            <form id="createRoomForm" style="margin-top: 1rem;">
                <div class="form-group">
                    <label for="newRoomPassword">Set Room Password</label>
                    <input type="text" id="newRoomPassword" required placeholder="Enter a password for students">
                </div>
                <button type="submit" class="btn btn-primary">Generate Room</button>
            </form>
        </div>
        
        <div id="roomDetails" style="display: none; text-align: center;">
            <h3 style="color: var(--success);">Room Created Successfully!</h3>
            <div style="margin: 1.5rem 0; font-size: 1.2rem;">
                <p>Room ID: <strong id="displayRoomId" style="color: var(--primary); font-size: 1.5rem;"></strong></p>
                <p>Password: <strong id="displayRoomPass"></strong></p>
            </div>
            <button id="enterAdminChatBtn" class="btn btn-primary">Enter Chat as Admin</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
