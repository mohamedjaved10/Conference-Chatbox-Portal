<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Chatbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-layout">
            <!-- Main Chat Area -->
            <div class="main-chat">
                <div class="chat-header">
                    <div id="roomInfo">
                        <h3 style="margin: 0;">Room: <span id="currentRoomId">----</span></h3>
                        <small id="userRole" style="color: var(--text-muted);"></small>
                    </div>
                    <div>
                        <button id="leaveBtn" class="btn btn-danger" style="padding: 0.5rem 1rem;">Leave Room</button>
                    </div>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <!-- Messages will be appended here dynamically -->
                    <div style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-top: auto;">
                        Welcome to the Conference Chatbox. Messages are anonymous to other students.
                    </div>
                </div>
                
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="Type your question or message here..." autocomplete="off">
                    <button id="sendBtn" class="btn btn-primary" style="width: auto;">Send</button>
                </div>
            </div>

            <!-- Admin Sidebar Area (Hidden for students) -->
            <div class="sidebar" id="adminSidebar" style="display: none;">
                <div class="sidebar-panel" style="flex: 0 0 auto; margin-bottom: 0;">
                    <h3 style="margin-top: 0;">Admin Controls</h3>
                    <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem;">
                        <button id="sendPollBtn" class="btn btn-primary">Send MCQ/Poll</button>
                        <button id="downloadAttendanceBtn" class="btn btn-primary" style="background: var(--success);">Download Attendance</button>
                        <button id="closeRoomBtn" class="btn btn-danger">Close Room</button>
                    </div>
                </div>
                
                <!-- Admin Table Area at Bottom of Chatbox (or sidebar) -->
                <div class="sidebar-panel">
                    <h3 style="margin-top: 0;">Students Joined</h3>
                    <div class="student-list">
                        <table id="attendanceTable">
                            <thead>
                                <tr>
                                    <th>Display Name</th>
                                    <th>Actual Name</th>
                                    <th>Reg No.</th>
                                    <th>Time</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Students will be appended here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MCQ Modal overlay (Hidden by default) -->
    <div id="mcqModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;">
        <div class="container" style="max-width: 400px;">
            <h3 style="margin-top: 0;">Create MCQ / Poll</h3>
            <div class="form-group" style="margin-bottom: 1rem;">
                <label>Type</label>
                <select id="mcqType" style="width: 100%; padding: 0.5rem; background: var(--bg-dark); color: var(--text-light); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;">
                    <option value="mcq">MCQ (Has a correct answer)</option>
                    <option value="poll">Poll (No correct answer)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Question</label>
                <input type="text" id="mcqQuestion" placeholder="Enter question">
            </div>
            <div class="form-group">
                <label id="labelOptA">Option A</label>
                <input type="text" id="mcqOptA" placeholder="Type answer here">
            </div>
            <div class="form-group">
                <label id="labelOptB">Option B</label>
                <input type="text" id="mcqOptB" placeholder="Type answer here">
            </div>
            <div class="form-group">
                <label id="labelOptC">Option C</label>
                <input type="text" id="mcqOptC" placeholder="Type answer here">
            </div>
            <div class="form-group">
                <label id="labelOptD">Option D</label>
                <input type="text" id="mcqOptD" placeholder="Type answer here">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button id="cancelMcqBtn" class="btn btn-danger">Cancel</button>
                <button id="submitMcqBtn" class="btn btn-primary">Send to Room</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
